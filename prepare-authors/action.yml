name: Prepare Authors
description: Update .authors.yml from recent commits and open or update an authors PR.
branding:
  icon: users
  color: green

inputs:
  authors-path:
    description: Path to the rever authors metadata file.
    default: .authors.yml
  since:
    description: Commit range to scan. Use tag for commits since the latest tag, or all.
    default: tag
  base-branch:
    description: Base branch for the generated authors PR.
    default: main
  branch-prefix:
    description: Prefix for the generated authors branch.
    default: prepare-authors-
  git-remote:
    description: Git remote alias used to resolve owner/repo for gh api.
    default: origin
  mode:
    description: prepare updates .authors.yml and opens a PR; check validates only.
    default: prepare
  git-author-name:
    description: Git author name for the generated commit.
    default: Conda Bot
  git-author-email:
    description: Git author email for the generated commit.
    default: 18747875+conda-bot@users.noreply.github.com
  token:
    description: GitHub token with contents:write and pull-requests:write for prepare mode.
    default: ${{ github.token }}

outputs:
  changed:
    description: Whether .authors.yml needed updates.
    value: ${{ steps.run.outputs.changed }}
  branch:
    description: Generated authors branch.
    value: ${{ steps.run.outputs.branch }}
  pull-request-url:
    description: Generated or updated authors PR URL.
    value: ${{ steps.run.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Compute Hash
      id: hash
      shell: bash
      run: echo hash="$(sha256sum "$GITHUB_ACTION_PATH/requirements.txt" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

    - name: Pip Cache
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: ~/.cache/pip
        key: ${{ github.workflow }}-prepare-authors-${{ steps.hash.outputs.hash }}

    - name: Setup Python
      uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
      with:
        python-version: '>=3.10'

    - name: Pip Install
      shell: bash
      run: pip install --quiet -r "$GITHUB_ACTION_PATH/requirements.txt"

    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.base-branch }}
        fetch-depth: 0
        persist-credentials: false
        token: ${{ inputs.token }}

    - name: Prepare Authors
      id: run
      shell: bash
      run: |
        args=(
          "$INPUT_MODE"
          --authors-path "$INPUT_AUTHORS_PATH"
          --since "$INPUT_SINCE"
          --git-remote "$INPUT_GIT_REMOTE"
        )
        if [ "$INPUT_MODE" = prepare ]; then
          args+=(
            --base-branch "$INPUT_BASE_BRANCH"
            --branch-prefix "$INPUT_BRANCH_PREFIX"
            --git-author-name "$INPUT_GIT_AUTHOR_NAME"
            --git-author-email "$INPUT_GIT_AUTHOR_EMAIL"
            --repository "$GITHUB_REPOSITORY"
            --token "$INPUT_TOKEN"
          )
        fi
        python "$GITHUB_ACTION_PATH/prepare_authors.py" "${args[@]}"
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_AUTHORS_PATH: ${{ inputs.authors-path }}
        INPUT_SINCE: ${{ inputs.since }}
        INPUT_GIT_REMOTE: ${{ inputs.git-remote }}
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        INPUT_GIT_AUTHOR_NAME: ${{ inputs.git-author-name }}
        INPUT_GIT_AUTHOR_EMAIL: ${{ inputs.git-author-email }}
        INPUT_TOKEN: ${{ inputs.token }}
