name: Prepare Release
description: Generate conda release notes from news fragments and open a release PR.
branding:
  icon: git-pull-request
  color: green

inputs:
  news-directory:
    description: Directory containing news fragments.
    default: news
  changelog-path:
    description: Changelog file to update.
    default: CHANGELOG.md
  release-branch-pattern:
    description: Comma- or newline-separated release branch glob patterns.
    default: '[0-9]*.[0-9]*.x'
  branch-prefix:
    description: Prefix for the generated release-notes branch.
    default: release-notes-
  git-author-name:
    description: Git author name for the generated commit.
    default: Conda Bot
  git-author-email:
    description: Git author email for the generated commit.
    default: 18747875+conda-bot@users.noreply.github.com
  token:
    description: 'GitHub token with contents: write and pull-requests: write.'
    default: ${{ github.token }}
outputs:
  version:
    description: Release version inferred from the release branch.
    value: ${{ steps.prepare.outputs.version }}
  branch:
    description: Generated release-notes branch.
    value: ${{ steps.prepare.outputs.branch }}
  pull-request-url:
    description: Generated or updated release PR URL.
    value: ${{ steps.prepare.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Verify Release Context
      id: context
      shell: bash
      run: >
        python "$GITHUB_ACTION_PATH/prepare_release.py"
        verify-context
        --release-branch-pattern "$INPUT_RELEASE_BRANCH_PATTERN"
      env:
        INPUT_RELEASE_BRANCH_PATTERN: ${{ inputs.release-branch-pattern }}
        PYTHONPATH: ${{ github.action_path }}/..

    - name: Checkout Release Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ steps.context.outputs.head-sha }}
        fetch-depth: 0
        persist-credentials: false
        token: ${{ inputs.token }}

    - name: Prepare Release Notes
      id: prepare
      shell: bash
      run: >
        python "$GITHUB_ACTION_PATH/prepare_release.py"
        prepare
        --news-directory "$INPUT_NEWS_DIRECTORY"
        --changelog-path "$INPUT_CHANGELOG_PATH"
        --release-branch-pattern "$INPUT_RELEASE_BRANCH_PATTERN"
        --branch-prefix "$INPUT_BRANCH_PREFIX"
        --git-author-name "$INPUT_GIT_AUTHOR_NAME"
        --git-author-email "$INPUT_GIT_AUTHOR_EMAIL"
        --repository "$GITHUB_REPOSITORY"
        --token "$INPUT_TOKEN"
      env:
        INPUT_NEWS_DIRECTORY: ${{ inputs.news-directory }}
        INPUT_CHANGELOG_PATH: ${{ inputs.changelog-path }}
        INPUT_RELEASE_BRANCH_PATTERN: ${{ inputs.release-branch-pattern }}
        INPUT_BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        INPUT_GIT_AUTHOR_NAME: ${{ inputs.git-author-name }}
        INPUT_GIT_AUTHOR_EMAIL: ${{ inputs.git-author-email }}
        INPUT_TOKEN: ${{ inputs.token }}
        PYTHONPATH: ${{ github.action_path }}/..
