name: Tests

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

  schedule:
    # https://crontab.guru/#15_14_*_*_*
    - cron: 15 14 * * *

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Cache Pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          # invalidate the cache anytime a requirements.txt changes
          key: ${{ github.workflow }}-${{ hashFiles('**/requirements.txt') }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '>=3.9'

      - name: Install Dependencies
        run: pip install --quiet -r requirements.txt -r combine-durations/requirements.txt -r template-files/requirements.txt

      - name: Run Tests
        run: pytest

      - name: Upload Coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # zizmor: ignore[secrets-outside-env] Repository-level CI upload token.

  read-file:
    name: Read file
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read Remote JSON
        id: json
        uses: ./read-file
        env:
          # `full_name` is the org/repo slug, extracting from `head` in case PR was opened via a fork
          FULL_NAME: ${{ github.event.pull_request.head.repo.full_name || github.event.repository.full_name }}
          # `head_ref` is the pull_request branch
          # `ref_name` is the push/workflow_dispatch/schedule branch
          REF: ${{ github.head_ref || github.ref_name }}
        with:
          path: https://raw.githubusercontent.com/${{ env.FULL_NAME }}/refs/heads/${{ env.REF }}/read-file/data/json.json
          parser: json

      - name: Read Local YAML
        id: yaml
        uses: ./read-file
        with:
          path: ./read-file/data/yaml.yaml
          parser: yaml

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '>=3.9'

      - name: Run Tests
        shell: python
        env:
          JSON_CONTENT: ${{ steps.json.outputs.content }}
          YAML_CONTENT: ${{ steps.yaml.outputs.content }}
          JSON_FOO: ${{ fromJSON(steps.json.outputs.content)['foo'] }}
          YAML_FOO: ${{ fromJSON(steps.yaml.outputs.content)['foo'] }}
        run: |
          import os
          assert os.environ['JSON_CONTENT'] == os.environ['YAML_CONTENT']
          assert os.environ['JSON_FOO'] == os.environ['YAML_FOO']

  template-files:
    name: Template files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # Post the sticky template audit comment on PRs.
      pull-requests: write  # Update pull request comments with template audit output.
    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Template Success
        id: templates-success
        uses: ./template-files
        with:
          config: ./template-files/data/success.yml
          stubs: ./template-files/data/templates

      - name: Template Error
        id: templates-error
        continue-on-error: true
        uses: ./template-files
        with:
          config: ./template-files/data/error.yml
          stubs: ./template-files/data/templates

      - name: Verify file contents
        run: diff --recursive .github_cache/template-files template-files/data/expected

      - name: Verify test outcomes
        run: |
          failed=0

          # Success case should succeed
          if [[ "${{ steps.templates-success.outcome }}" != "success" ]]; then
            echo "::error::Success case: Expected step to succeed"
            failed=1
          fi

          # Error case should fail
          if [[ "${{ steps.templates-error.outcome }}" != "failure" ]]; then
            echo "::error::Error case: Expected step to fail"
            failed=1
          fi

          exit $failed

      - name: Filter Changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'template-files/**'
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.filter.outputs.code == 'true'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3.0.4
        with:
          message: |
            ### Template Success
            > [!WARNING]
            > This is what the audit looks like when the templating has no errors.
            ${{ steps.templates-success.outputs.summary }}

            ### Template Error
            > [!WARNING]
            > This is what the audit looks like when templating results in errors.
            ${{ steps.templates-error.outputs.summary }}
          GITHUB_TOKEN: ${{ secrets.SANDBOX_TEMPLATE_TOKEN }}  # zizmor: ignore[secrets-outside-env] Repository-level token for sticky PR test comments.

  # required check
  analyze:
    name: Analyze
    needs: [pytest, read-file, template-files]
    if: '!cancelled()'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # Open or update scheduled test-failure reports.
    steps:
      - name: Determine Success
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        id: alls-green
        with:
          jobs: ${{ toJSON(needs) }}

      - name: Checkout our source
        if: always() && github.event_name != 'pull_request' && steps.alls-green.outputs.result == 'failure'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Report failures
        if: always() && github.event_name != 'pull_request' && steps.alls-green.outputs.result == 'failure'
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5 # v2.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_REPORT_TEST_FAILURE }}  # zizmor: ignore[secrets-outside-env] Repository-level token for scheduled failure reports.
          RUN_ID: ${{ github.run_id }}
          TITLE: 🤖 Tests Failed
        with:
          filename: .github/TEST_FAILURE_REPORT_TEMPLATE.md
          update_existing: true
