# zizmor configuration file
# https://docs.zizmor.sh/configuration/
#
# Workflows synced from conda/infrastructure (cla.yml, issues.yml,
# labels.yml, project.yml, stale.yml) cannot be modified in this
# repo. Findings in those files are suppressed here; fixes should
# be applied upstream in conda/infrastructure.

rules:
  dangerous-triggers:
    ignore:
      # cla.yml uses pull_request_target but does not check out
      # untrusted PR code; it only reacts to issue_comment and
      # pull_request_target events to run the CLA check action.
      # Synced from conda/infrastructure.
      - cla.yml

      # project.yml uses pull_request_target but does not check out
      # any code; it only adds PRs to a GitHub project.
      # Synced from conda/infrastructure.
      - project.yml

  excessive-permissions:
    ignore:
      # Synced from conda/infrastructure; permissions should be
      # tightened upstream.
      - cla.yml
      - issues.yml
      - labels.yml
      - project.yml
      - stale.yml
      - update.yml

  undocumented-permissions:
    ignore:
      # Synced from conda/infrastructure; permission comments should
      # be added upstream.
      - stale.yml

  anonymous-definition:
    ignore:
      # Synced from conda/infrastructure; job names should be added
      # upstream.
      - cla.yml
      - issues.yml
      - labels.yml
      - project.yml
      - stale.yml
      - update.yml

  concurrency-limits:
    ignore:
      # Synced from conda/infrastructure; concurrency settings should
      # be added upstream.
      - cla.yml
      - issues.yml
      - labels.yml
      - project.yml
      - stale.yml
      - update.yml

  superfluous-actions:
    ignore:
      # Synced from conda/infrastructure.
      - issues.yml
      - update.yml

  artipacked:
    ignore:
      # Synced from conda/infrastructure.
      - labels.yml
      - update.yml

  template-injection:
    ignore:
      # Synced from conda/infrastructure.
      - stale.yml
      - update.yml
